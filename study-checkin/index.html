<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>学习打卡</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand">
          <div class="logo" aria-hidden="true">✓</div>
          <div>
            <div class="title">个人学习打卡</div>
            <div class="subtitle" id="subtitle">把每一天都记下来</div>
          </div>
        </div>

        <div class="stats" aria-label="统计">
          <div class="stat">
            <div class="statLabel">连续天数</div>
            <div class="statValue" id="statStreak">0</div>
          </div>
          <div class="stat">
            <div class="statLabel">本月打卡</div>
            <div class="statValue" id="statMonth">0</div>
          </div>
          <div class="stat">
            <div class="statLabel">总打卡</div>
            <div class="statValue" id="statTotal">0</div>
          </div>
        </div>
      </header>

      <main class="grid">
        <section class="card">
          <div class="cardHeader">
            <h2>今日打卡</h2>
            <div class="muted" id="todayText"></div>
          </div>

          <form id="checkinForm" class="form">
            <label class="field">
              <span class="label">日期</span>
              <input type="date" id="dateInput" required />
            </label>

            <div class="row">
              <label class="field">
                <span class="label">学习时长（分钟）</span>
                <input type="number" id="minutesInput" min="0" step="5" placeholder="例如 60" />
              </label>
              <label class="field">
                <span class="label">标签（可选）</span>
                <input type="text" id="tagsInput" placeholder="例如 英语, 算法" />
              </label>
            </div>

            <label class="field">
              <span class="label">学习内容</span>
              <textarea id="contentInput" rows="4" maxlength="500" placeholder="写下你今天学了什么（最多 500 字）" required></textarea>
              <span class="hint" id="contentHint">0 / 500</span>
            </label>

            <div class="actions">
              <button type="submit" class="btn primary" id="saveBtn">保存打卡</button>
              <button type="button" class="btn" id="quickTodayBtn">填入今天</button>
              <button type="button" class="btn danger" id="deleteBtn" title="删除所选日期的打卡">删除该日</button>
            </div>

            <div class="small muted" id="saveStatus" role="status" aria-live="polite"></div>
          </form>
        </section>

        <section class="card">
          <div class="cardHeader">
            <h2>日历</h2>
            <div class="calendarNav">
              <button class="iconBtn" id="prevMonthBtn" aria-label="上一月">‹</button>
              <div class="calendarTitle" id="calendarTitle">—</div>
              <button class="iconBtn" id="nextMonthBtn" aria-label="下一月">›</button>
              <button class="chipBtn" id="jumpTodayBtn" type="button">今天</button>
            </div>
          </div>
          <div class="calendar" id="calendar" aria-label="打卡日历"></div>
          <div class="legend">
            <span class="dot done"></span><span class="muted">已打卡</span>
            <span class="dot selected"></span><span class="muted">当前选中</span>
          </div>
        </section>

        <section class="card span2">
          <div class="cardHeader">
            <h2>记录</h2>
            <div class="tools">
              <label class="search">
                <span class="srOnly">搜索</span>
                <input id="searchInput" type="search" placeholder="搜索内容/标签…" />
              </label>
              <button class="btn" id="exportBtn" type="button">导出 JSON</button>
              <label class="btn fileBtn" for="importFile">
                导入 JSON
                <input id="importFile" type="file" accept="application/json" />
              </label>
              <button class="btn danger" id="wipeBtn" type="button" title="清空所有本地数据">清空数据</button>
            </div>
          </div>
          <div class="list" id="list"></div>
          <div class="empty muted" id="emptyState">还没有任何打卡记录。先从今天开始吧。</div>
        </section>
      </main>

      <footer class="footer">
        <div class="muted">
          数据默认保存在本地浏览器（localStorage）。建议定期导出备份。
        </div>
      </footer>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
